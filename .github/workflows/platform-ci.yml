name: Platform CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync Python dependencies
        run: uv sync --frozen --group dev
      - name: Run unit tests
        run: uv run pytest

  vite-frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm install
      - name: Build current production frontend
        run: npm run build

  next-enterprise-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/smith_heffa_enterprise?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Next.js app dependencies
        run: npm install
      - name: Lint enterprise web app
        run: npm run lint
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Build enterprise web app
        run: npm run build
